<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Kverdrive - Chauffeur VTC Montargis | Réservation Navettes Aéroports & Mariages</title>
    <meta name="description" content="Contactez Kverdrive, chauffeur VTC haut de gamme à Montargis. Réservez vos transferts aéroports Orly/Roissy, navettes gares TGV et transport mariage. Devis gratuit sous 24h.">
    <meta name="keywords" content="contact Kverdrive, réservation VTC Montargis, devis chauffeur privé, transfert aéroport Montargis, transport mariage Loiret">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://www.kverdrive.fr/kevin/contact.html">
    <link rel="icon" type="image/png" sizes="32x32" href="kevin/img/v2.png">
    <link rel="icon" type="image/png" sizes="16x16" href="kevin/img/v2.png">

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ContactPage",
      "name": "Contact Kverdrive - Chauffeur VTC Montargis",
      "description": "Contactez Kverdrive pour réserver votre chauffeur VTC haut de gamme à Montargis",
      "url": "https://www.kverdrive.fr/kevin/contact.html",
      "mainEntity": {
        "@type": "TaxiService",
        "name": "Kverdrive",
        "telephone": "+33",
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Montargis",
          "addressRegion": "Loiret",
          "addressCountry": "FR"
        },
        "areaServed": ["Montargis", "Orly", "Roissy", "Paris", "Massy"]
      }
    }
    </script>

    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

    <header class="header-center">
        <a href="../index.html" class="logo-link">
            <div> <img src="img/v2.png" width="20%"></div>
        </a>
        <a href="contact.html" class="bouton-de-page">Contact</a>
    </header>

    <main>
        <div class="Titre">
            <h1>Contactez-nous</h1>
            <p class="Titre-Desc">Nous répondons sous 24h</p>
        </div>

        <section id="Contact" class="section active contact-section">
            <form action="#" method="post" enctype="text/plain">

                <div class="form-row">
                    <div class="form-group">
                        <label for="nom">Nom</label>
                        <input type="text" id="Nom" name="Nom" placeholder="Votre nom" required>
                    </div>
                    <div class="form-group">
                        <label for="prenom">Prénom</label>
                        <input type="text" id="Prenom" name="Prenom" placeholder="Votre prénom" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="Email" name="Email" placeholder="votre@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="Tel">Tel</label>
                        <input type="Tel" id="Tel" name="Tel" placeholder="Votre numéro de téléphone" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="lieu-depart">Lieu de prise en charge</label>
                        <input type="text" id="LieuDepart" name="LieuDepart" placeholder="Point de départ" required>
                    </div>
                    <div class="form-group">
                        <label for="lieu-arrivee">Lieu d'arrivée</label>
                        <input type="text" id="LieuArrivee" name="LieuArrivee" placeholder="Point d'arrivée" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="Date">Date</label>
                        <input type="date" id="Date" name="Date" placeholder="Date de votre demande" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="Nombre">Nombre de passagers</label>
                        <input type="number" id="Nombre" name="Nombre" min="1" max="3" placeholder="1, 2 ou 3" required>
                    </div>
                </div>


                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="Message" name="Message" placeholder="Décrivez votre besoin..." required></textarea>
                </div>

                <button type="submit" class="btn-submit">Envoyer le message</button>
            </form>
        </section>
    </main>

    <footer>
        <a href="../index.html" class="logo-link" title="Retour à l'accueil Kverdrive">
            <div><img src="img/v2.png" width="10%"></div>
        </a>
        <p class="footer-copyright">&copy; 2026 Kverdrive – Chauffeur VTC Montargis. Tous droits réservés.</p>
        <div class="footer-links">
            <a href="confidentialite.html" class="bouton-de-page" title="Politique de confidentialité Kverdrive">Confidentialité</a>
            <a href="mentions-legales.html" class="bouton-de-page" title="Mentions légales Kverdrive">Mentions légales</a>
            <a href="contact.html" class="bouton-de-page" title="Contact Kverdrive">Contact</a>
        </div>
    </footer>

<script src="emailjs.min.js"></script>
<script src="script.js"></script>
</body>
</html>
