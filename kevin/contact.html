<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — Élégance & Transport</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

    <header class="header-center">
        <a href="../index.html" class="logo-link">
            <div> <img src="img/v2.png" width="20%"></div>
        </a>
        <a href="contact.html" class="btn-contact">Contact</a>
    </header>

    <main>
        <div class="Titre">
            <h1>Contactez-nous</h1>
            <p class="Titre-Desc">Nous répondons sous 24h</p>
        </div>

        <section id="Contact" class="section active contact-section">
            <form action="#" method="post" enctype="text/plain">

                <div class="form-row">
                    <div class="form-group">
                        <label for="nom">Nom</label>
                        <input type="text" id="Nom" name="Nom" placeholder="Votre nom" required>
                    </div>
                    <div class="form-group">
                        <label for="prenom">Prénom</label>
                        <input type="text" id="Prenom" name="Prenom" placeholder="Votre prénom" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="Email" name="Email" placeholder="votre@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="Tel">Tel</label>
                        <input type="Tel" id="Tel" name="Tel" placeholder="Votre numéro de téléphone" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="lieu-depart">Lieu de prise en charge</label>
                        <input type="text" id="LieuDepart" name="LieuDepart" placeholder="Point de départ" required>
                    </div>
                    <div class="form-group">
                        <label for="lieu-arrivee">Lieu d'arrivée</label>
                        <input type="text" id="LieuArrivee" name="LieuArrivee" placeholder="Point d'arrivée" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="Date">Date</label>
                        <input type="date" id="Date" name="Date" placeholder="Date de votre demande" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="Nombre">Nombre de passagers</label>
                        <input type="number" id="Nombre" name="Nombre" min="1" max="3" placeholder="1, 2 ou 3" required>
                    </div>
                </div>


                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="Message" name="Message" placeholder="Décrivez votre besoin..." required></textarea>
                </div>

                <button type="submit" class="btn-submit">Envoyer le message</button>
            </form>
        </section>
    </main>

    <footer>
        <a href="../index.html" class="logo-link">
            <div><img src="img/v2.png" width="10%"></div>
        </a>
        <p> &copy; 2026 K-VERDRIVE. Tous droits réservés.
            <a href="#">Confidentialité</a> | <a href="#">Mentions légales</a>
        </p>
        <a href="contact.html" class="btn-contact">Contact</a>
    </footer>

<script src="emailjs.min.js"></script>
<script src="script.js"></script>
</body>
</html>
